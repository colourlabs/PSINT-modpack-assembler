name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: install deps
        run: sudo apt install -y libcurl4-openssl-dev libssl-dev libzip-dev ninja-build meson

      - name: build
        run: |
          meson setup build --buildtype=release
          ninja -C build

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: please-speed-linux
          path: build/please-speed

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-curl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-libzip

      - name: build
        run: |
          meson setup build --buildtype=release
          ninja -C build

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: please-speed-windows
          path: build/please-speed.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: install deps
        run: brew install curl openssl libzip ninja meson

      - name: build
        run: |
          meson setup build --buildtype=release
          ninja -C build

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: please-speed-macos
          path: build/please-speed